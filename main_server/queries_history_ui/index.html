<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Queries history</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #12131c;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 2rem 1.5rem;
            color: #eef2ff;
            font-size: 16px;
            /* явно задаём базовый размер */
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* хедер */
        .header {
            background: rgba(25, 28, 40, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 1.75rem;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(71, 85, 105, 0.5);
        }

        h1 {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 650;
            font-size: 1.9rem;
            /* чуть крупнее, как в карточном хедере */
            color: #f0f3fa;
        }

        h1 i {
            background: linear-gradient(135deg, #f97316, #dc2626);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .sub {
            color: #a5b4cb;
            margin-top: 0.4rem;
            font-size: 0.9rem;
            /* увеличено с 0.85rem */
            border-left: 3px solid #f97316;
            padding-left: 0.75rem;
        }

        /* панель управления */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .stats {
            background: #1e2438;
            border-radius: 2rem;
            padding: 0.4rem 1.2rem;
            font-size: 0.9rem;
            /* увеличено */
            border: 1px solid #334155;
        }

        .search-wrap {
            flex: 1;
            min-width: 220px;
            position: relative;
        }

        .search-wrap i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        #searchInput {
            width: 100%;
            padding: 0.7rem 1rem 0.7rem 2.5rem;
            border-radius: 2rem;
            border: 1px solid #2d374e;
            background: #0f1119;
            color: #f0f3fa;
            font-size: 0.95rem;
            /* увеличено */
        }

        #searchInput:focus {
            border-color: #f97316;
            outline: none;
            box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.3);
        }

        .btn {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-weight: 500;
            font-size: 0.9rem;
            /* увеличено */
            color: #f1f5f9;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: #f97316;
            border: none;
            color: #0f0f1a;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #ea580c;
            transform: translateY(-1px);
        }

        .btn-outline:hover {
            background: #2d374e;
        }

        /* Блочная структура */
        .keys-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .key-block {
            background: #161b29;
            border-radius: 1.5rem;
            border: 1px solid #2a2f42;
            overflow: hidden;
        }

        .block-header {
            background: #10131f;
            padding: 1rem 1.5rem;
            /* увеличен отступ */
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #262e42;
        }

        .key-title {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-weight: 700;
            font-size: 1.1rem;
            /* как в карточках (было 1rem) */
            color: #fdba74;
            word-break: break-all;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            letter-spacing: -0.2px;
        }

        .copy-key-btn {
            background: #262d40;
            border: none;
            color: #b9c3dd;
            width: 30px;
            height: 30px;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.1s;
        }

        /* строки внутри блока */
        .fields-list {
            display: flex;
            flex-direction: column;
        }

        .field-row {
            display: flex;
            align-items: center;
            padding: 0.85rem 1.5rem;
            /* увеличены внутренние отступы */
            border-bottom: 1px solid #1f253b;
            gap: 1rem;
        }

        .field-row:last-child {
            border-bottom: none;
        }

        .field-name {
            width: 28%;
            font-weight: 600;
            font-family: monospace;
            color: #cbd5e6;
            background: #0f111c;
            padding: 0.3rem 0.7rem;
            /* больше воздуха */
            border-radius: 1rem;
            word-break: break-word;
            font-size: 0.95rem;
            /* было 0.85rem – увеличили */
        }

        .field-value-wrapper {
            width: 72%;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .field-value {
            flex: 1;
            font-family: monospace;
            color: #e2e8f0;
            word-break: break-word;
            white-space: pre-wrap;
            background: #0e111b;
            padding: 0.3rem 0.7rem;
            border-radius: 1rem;
            font-size: 0.95rem;
            /* было 0.85rem – увеличили */
            line-height: 1.4;
            /* улучшает читаемость */
        }

        .copy-value-btn {
            background: #262d40;
            border: none;
            color: #b9c3dd;
            width: 28px;
            height: 28px;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.1s;
            flex-shrink: 0;
        }

        .copy-value-btn:hover {
            background: #3b425a;
            color: #f97316;
        }

        .empty-dict-placeholder {
            padding: 1.2rem 1.5rem;
            color: #8da0bc;
            font-style: italic;
            background: #0f121d;
            text-align: center;
            font-size: 0.95rem;
        }

        .loading,
        .empty-message {
            text-align: center;
            padding: 3rem;
            background: #151a28;
            border-radius: 1.5rem;
            font-size: 1rem;
            /* сделали крупнее */
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.85rem;
            /* футер чуть крупнее */
            color: #5f7292;
            border-top: 1px solid #232a3f;
            padding-top: 1.5rem;
        }

        @media (max-width: 700px) {
            body {
                padding: 1rem;
            }

            .field-row {
                flex-direction: column;
                align-items: stretch;
            }

            .field-name,
            .field-value-wrapper {
                width: 100%;
            }

            .field-name,
            .field-value {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-clock"></i> История запросов</h1>
            <div class="sub">Данные принятых запросов в формате "время -> информация".</div>
            <div class="toolbar">
                <div class="stats">
                    <span><i class="fas fa-database"></i> <span id="totalKeys">0</span> запросов</span>
                </div>
                <div class="search-wrap">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Поиск по значению...">
                </div>
                <div class="actions">
                    <button id="refreshBtn" class="btn btn-primary"><i class="fas fa-sync-alt"></i> Обновить</button>
                    <button id="clearSearchBtn" class="btn btn-outline"><i class="fas fa-times"></i> Сброс</button>
                </div>
            </div>
        </div>

        <div id="keysContainer" class="keys-list">
            <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Загрузка из Redis API...</div>
        </div>
        <footer><i class="fas fa-code-branch"></i> Данные из /get_queries_history · формат ключа: имя:timestamp</footer>
    </div>

    <script>
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        let originalData = {};      // { key: {field: value, ...} }
        let currentFilter = "";

        const container = document.getElementById('keysContainer');
        const searchInput = document.getElementById('searchInput');
        const totalKeysSpan = document.getElementById('totalKeys');
        const refreshBtn = document.getElementById('refreshBtn');
        const clearSearchBtn = document.getElementById('clearSearchBtn');

        // Функция извлечения timestamp из ключа формата "name:timestamp"
        // Возвращает число (миллисекунды) для сортировки, или null если не удалось распарсить
        function extractTimestampFromKey(key) {
            const colonIndex = key.indexOf(':');
            if (colonIndex === -1) return null;
            let timestampStr = key.substring(colonIndex + 1).trim();
            // Заменяем пробел на 'T' для совместимости с Date.parse
            timestampStr = timestampStr.replace(' ', 'T');
            const date = new Date(timestampStr);
            return isNaN(date.getTime()) ? null : date.getTime();
        }

        // Сортировка ключей по timestamp убывание (новые сверху)
        function sortKeysByTimestampDesc(keys) {
            const withTimestamp = keys.map(key => {
                let ts = extractTimestampFromKey(key);
                if (ts === null || isNaN(ts)) ts = -Infinity; // ключи без корректного времени уходят в конец
                return { key, ts };
            });
            withTimestamp.sort((a, b) => {
                if (a.ts === b.ts) return a.key.localeCompare(b.key);
                return b.ts - a.ts; // по убыванию (сначала новые)
            });
            return withTimestamp.map(item => item.key);
        }

        // Получение отфильтрованных и отсортированных блоков
        function getFilteredAndSortedBlocks() {
            const term = currentFilter.trim().toLowerCase();
            const resultBlocks = [];

            for (const [key, dict] of Object.entries(originalData)) {
                // Сортируем поля внутри каждого ключа по имени (возрастание)
                const sortedEntries = Object.entries(dict).sort((a, b) => a[0].localeCompare(b[0]));
                const filteredEntries = term ? sortedEntries.filter(([field, value]) =>
                    key.toLowerCase().includes(term) ||
                    field.toLowerCase().includes(term) ||
                    String(value).toLowerCase().includes(term)
                ) : sortedEntries;

                if (filteredEntries.length > 0) {
                    const filteredDict = Object.fromEntries(filteredEntries);
                    resultBlocks.push({ key, dict: filteredDict });
                } else if (key.toLowerCase().includes(term)) {
                    // ключ подходит, но поля не попали — показываем все поля
                    resultBlocks.push({ key, dict: Object.fromEntries(sortedEntries) });
                }
            }

            // Сортировка блоков по убыванию timestamp (новые сверху)
            resultBlocks.sort((a, b) => {
                const tsA = extractTimestampFromKey(a.key);
                const tsB = extractTimestampFromKey(b.key);
                if (tsA === null && tsB === null) return a.key.localeCompare(b.key);
                if (tsA === null) return 1;
                if (tsB === null) return -1;
                if (tsA === tsB) return a.key.localeCompare(b.key);
                return tsB - tsA;
            });

            return resultBlocks;
        }

        // отрисовка блоков
        function render() {
            const blocks = getFilteredAndSortedBlocks();
            const totalKeyCount = Object.keys(originalData).length;
            totalKeysSpan.innerText = totalKeyCount;

            if (!blocks.length) {
                container.innerHTML = `<div class="empty-message">
                                        <i class="fas fa-filter" style="font-size: 2rem; opacity: 0.6;"></i>
                                        <p style="margin-top: 0.8rem;">Нет данных, соответствующих фильтру</p>
                                        <button id="resetFilterBtn" class="btn btn-outline" style="margin-top: 1rem;">Сбросить поиск</button>
                                    </div>`;
                const resetBtn = document.getElementById('resetFilterBtn');
                if (resetBtn) resetBtn.addEventListener('click', () => {
                    searchInput.value = '';
                    currentFilter = '';
                    render();
                });
                return;
            }

            let html = '';
            for (const block of blocks) {
                const key = block.key;
                const dict = block.dict;
                const entries = Object.entries(dict);
                const escapedKey = escapeHtml(key);

                html += `<div class="key-block" data-key="${escapedKey.replace(/"/g, '&quot;')}">
                        <div class="block-header">
                            <div class="key-title">
                                <i class="fas fa-tag"></i> ${escapedKey}
                            </div>
                            <button class="copy-key-btn" data-copykey="${escapedKey.replace(/"/g, '&quot;')}" title="Копировать ключ">
                                <i class="far fa-copy"></i>
                            </button>
                        </div>
                        <div class="fields-list">`;

                if (entries.length === 0) {
                    html += `<div class="empty-dict-placeholder"><i class="far fa-folder-open"></i> Пустой словарь</div>`;
                } else {
                    for (const [field, value] of entries) {
                        const escapedField = escapeHtml(field);
                        const escapedValue = escapeHtml(String(value ?? ''));
                        html += `
                        <div class="field-row">
                            <div class="field-name">${escapedField}</div>
                            <div class="field-value-wrapper">
                                <div class="field-value">${escapedValue || '<span style="opacity:0.6;">∅</span>'}</div>
                                <button class="copy-value-btn" data-value="${escapedValue.replace(/"/g, '&quot;')}" title="Копировать значение">
                                    <i class="far fa-copy"></i>
                                </button>
                            </div>
                        </div>
                    `;
                    }
                }
                html += `</div></div>`;
            }
            container.innerHTML = html;

            // Копирование ключа
            document.querySelectorAll('.copy-key-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const key = btn.getAttribute('data-copykey');
                    if (key) {
                        navigator.clipboard.writeText(key).then(() => {
                            const original = btn.innerHTML;
                            btn.innerHTML = '<i class="fas fa-check"></i>';
                            setTimeout(() => { btn.innerHTML = original; }, 800);
                        }).catch(() => alert('Не удалось скопировать'));
                    }
                });
            });

            // Копирование значения (подблока)
            document.querySelectorAll('.copy-value-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const val = btn.getAttribute('data-value');
                    if (val !== undefined && val !== null) {
                        navigator.clipboard.writeText(val).then(() => {
                            const original = btn.innerHTML;
                            btn.innerHTML = '<i class="fas fa-check"></i>';
                            setTimeout(() => { btn.innerHTML = original; }, 800);
                        }).catch(() => alert('Ошибка копирования значения'));
                    }
                });
            });
        }

        function applyFilter() {
            currentFilter = searchInput.value;
            render();
        }

        // загрузка из API
        async function fetchFromApi() {
            container.innerHTML = `<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Запрос к /get_queries_history ...</div>`;
            try {
                const resp = await fetch('/get_queries_history');
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();
                let payload = data;
                if (data && typeof data === 'object' && data.data) payload = data.data;
                if (!payload || typeof payload !== 'object') throw new Error('Неверный формат');
                originalData = payload;
                searchInput.value = '';
                currentFilter = '';
                render();
                showToast(`✅ Загружено ${Object.keys(originalData).length} запросов`, false);
            } catch (err) {
                console.error(err);
                container.innerHTML = `<div class="empty-message">
                                        <i class="fas fa-exclamation-triangle"></i>
                                        <p>Ошибка подключения к API. Запустите бэкенд.</p>
                                        <button id="retryBtn" class="btn btn-primary">Повторить</button>
                                    </div>`;
                const retry = document.getElementById('retryBtn');
                if (retry) retry.addEventListener('click', () => fetchFromApi());
                showToast('Не удалось загрузить данные', true);
            }
        }

        function showToast(msg, isError) {
            const t = document.createElement('div');
            t.style.cssText = `position:fixed; bottom:20px; right:20px; background:${isError ? '#b91c1c' : '#1e293b'}; color:white; padding:8px 16px; border-radius:40px; font-size:0.8rem; z-index:999; box-shadow:0 4px 12px black; border-left: 4px solid #f97316;`;
            t.innerHTML = `<i class="fas ${isError ? 'fa-times-circle' : 'fa-check-circle'}"></i> ${msg}`;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2800);
        }

        function init() {
            refreshBtn.addEventListener('click', () => fetchFromApi());
            clearSearchBtn.addEventListener('click', () => {
                searchInput.value = '';
                currentFilter = '';
                render();
                showToast('Поиск сброшен', false);
            });
            searchInput.addEventListener('input', applyFilter);
            fetchFromApi();
        }

        init();
    </script>
</body>

</html>
