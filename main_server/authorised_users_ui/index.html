<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Authorised Users</title>
    <!-- Font Awesome 6 (Free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #12131c;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 2rem 1.5rem;
            color: #eef2ff;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap');

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* хедер — полупрозрачный тёмный */
        .dashboard-header {
            background: rgba(25, 28, 40, 0.85);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(71, 85, 105, 0.5);
        }

        h1 {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 650;
            font-size: 1.9rem;
            color: #f0f3fa;
            letter-spacing: -0.3px;
        }

        h1 i {
            background: #f97316;
            background: linear-gradient(135deg, #f97316, #dc2626);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 2rem;
        }

        .sub {
            color: #a5b4cb;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            border-left: 3px solid #f97316;
            padding-left: 0.75rem;
        }

        /* панель управления */
        .control-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .stats-badge {
            background: #1e2438;
            color: #e2e8f0;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid #334155;
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            background: #1e293b;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-weight: 500;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            color: #f1f5f9;
            border: 1px solid #334155;
        }

        .btn-primary {
            background: #f97316;
            color: #0f0f1a;
            border: none;
            font-weight: 600;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .btn-primary:hover {
            background: #ea580c;
            transform: translateY(-1px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #4b556b;
            color: #cbd5e6;
        }

        .btn-outline:hover {
            background: #2d374e;
            border-color: #7f8ea3;
        }

        .search-wrapper {
            flex: 1;
            min-width: 240px;
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 0.9rem;
        }

        #searchInput {
            width: 100%;
            padding: 0.7rem 1rem 0.7rem 2.5rem;
            border-radius: 2.5rem;
            border: 1px solid #2d374e;
            background: #0f1119;
            color: #f0f3fa;
            font-size: 0.9rem;
            transition: 0.2s;
            font-family: inherit;
        }

        #searchInput:focus {
            outline: none;
            border-color: #f97316;
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.25);
        }

        #searchInput::placeholder {
            color: #6c7a96;
        }

        /* сетка карточек */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 1.75rem;
            margin-top: 1rem;
        }

        /* карточка ключа (тёмная, но мягкая) */
        .redis-card {
            background: #1a1e2c;
            border-radius: 1.75rem;
            box-shadow: 0 15px 30px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.25s ease;
            overflow: hidden;
            border: 1px solid #2a2f42;
            display: flex;
            flex-direction: column;
        }

        .redis-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 22px 36px -12px rgba(0, 0, 0, 0.6);
            border-color: #f9731640;
        }

        .card-header {
            background: #151a28;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #272e42;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
        }

        .key-name {
            font-weight: 700;
            font-size: 1.1rem;
            font-family: 'SF Mono', 'Fira Code', monospace;
            background: #0f1119;
            padding: 0.2rem 0.7rem;
            border-radius: 2rem;
            color: #fdba74;
            word-break: break-all;
            letter-spacing: -0.2px;
        }

        .copy-key {
            background: #262d40;
            border: none;
            font-size: 1rem;
            color: #b9c3dd;
            cursor: pointer;
            transition: 0.1s;
            padding: 0.3rem;
            border-radius: 2rem;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .copy-key:hover {
            background: #3b425a;
            color: #f97316;
        }

        .dict-body {
            padding: 1.25rem 1.5rem 1.5rem;
            flex: 1;
        }

        .dict-item {
            display: flex;
            border-bottom: 1px solid #262e42;
            padding: 0.6rem 0;
            font-size: 0.85rem;
            align-items: flex-start;
            gap: 0.75rem;
        }

        .dict-item:last-child {
            border-bottom: none;
        }

        .dict-field {
            width: 35%;
            font-weight: 600;
            color: #cbd5e6;
            font-family: monospace;
            word-break: break-word;
            background: #0f111c;
            padding: 0.2rem 0.4rem;
            border-radius: 8px;
        }

        .dict-value {
            width: 65%;
            color: #e2e8f0;
            word-break: break-word;
            font-family: 'SF Mono', monospace;
            background: #0e111b;
            padding: 0.2rem 0.4rem;
            border-radius: 8px;
            white-space: pre-wrap;
        }

        .empty-dict {
            text-align: center;
            padding: 1rem;
            color: #8da0bc;
            font-style: italic;
            background: #0f121d;
            border-radius: 1rem;
            font-size: 0.85rem;
        }

        .badge-length {
            font-size: 0.7rem;
            background: #252c40;
            border-radius: 30px;
            padding: 0.2rem 0.6rem;
            margin-left: 0.5rem;
            font-weight: normal;
            color: #cbd5e6;
        }

        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            gap: 0.8rem;
            color: #b9c3dd;
        }

        .info-message {
            background: #1e293b;
            border-radius: 1.2rem;
            padding: 0.7rem 1.2rem;
            font-size: 0.8rem;
            color: #d9e2ef;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.75rem;
            color: #7083a3;
            border-top: 1px solid #232a3f;
            padding-top: 1.8rem;
        }

        @media (max-width: 700px) {
            body {
                padding: 1rem;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }

            .control-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .dict-field,
            .dict-value {
                width: auto;
            }

            .dict-item {
                flex-direction: column;
                gap: 0.3rem;
                border-bottom: 1px solid #242c40;
                padding: 0.75rem 0;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="dashboard-header">
            <h1>
                <i class="fas fa-database"></i>
                Авторизованные пользователи
            </h1>
            <div class="sub">
                Данные авторизованных пользователей в формате "имя -> данные"
            </div>

            <div class="control-bar">
                <div class="stats-badge" id="statsArea">
                    <i class="fas fa-key"></i> <span id="totalKeys">0</span> пользователей
                    <span style="margin-left: 0.3rem;">•</span>
                    <i class="fas fa-eye"></i> <span id="displayedKeys">0</span> отображено
                </div>

                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Поиск по пользователям, данным..."
                        autocomplete="off">
                </div>

                <div class="button-group">
                    <button id="refreshApiBtn" class="btn btn-primary"><i class="fas fa-sync-alt"></i> Обновить</button>
                    <button id="clearSearchBtn" class="btn btn-outline"><i class="fas fa-times"></i> Сбросить
                        поиск</button>
                </div>
            </div>
        </div>

        <div id="cardsContainer" class="cards-grid">
            <div class="loading-spinner" id="initialLoader">
                <i class="fas fa-spinner fa-pulse"></i> Загрузка данных из Redis API...
            </div>
        </div>
        <footer>
            <i class="fas fa-plug"></i> Подключение к бэкенду FastAPI /get_authorised_users • Данные хешей отображаются
            в
            реальном времени
        </footer>
    </div>

    <script>
        // ----- Утилиты -----
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function (c) {
                return c;
            });
        }

        // глобальное состояние
        let originalData = {};     // { "ключ": { "поле": "значение", ... } }
        let currentFilterText = "";

        // DOM элементы
        const container = document.getElementById('cardsContainer');
        const searchInput = document.getElementById('searchInput');
        const totalKeysSpan = document.getElementById('totalKeys');
        const displayedKeysSpan = document.getElementById('displayedKeys');
        const refreshApiBtn = document.getElementById('refreshApiBtn');
        const clearSearchBtn = document.getElementById('clearSearchBtn');

        // функция глубокого поиска (регистронезависимо)
        function matchesSearch(key, dict, searchTerm) {
            if (!searchTerm) return true;
            const term = searchTerm.toLowerCase();
            if (key.toLowerCase().includes(term)) return true;
            for (const [field, value] of Object.entries(dict)) {
                if (field.toLowerCase().includes(term)) return true;
                if (String(value).toLowerCase().includes(term)) return true;
            }
            return false;
        }

        function getFilteredData() {
            if (!currentFilterText.trim()) {
                return originalData;
            }
            const filtered = {};
            for (const [key, dict] of Object.entries(originalData)) {
                if (matchesSearch(key, dict, currentFilterText.trim())) {
                    filtered[key] = dict;
                }
            }
            return filtered;
        }

        // отрисовка карточек
        function render(dataToRender) {
            const entries = Object.entries(dataToRender);
            const totalOriginal = Object.keys(originalData).length;
            const displayedCount = entries.length;

            totalKeysSpan.innerText = totalOriginal;
            displayedKeysSpan.innerText = displayedCount;

            if (!entries.length) {
                container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem; background:#151a28; border-radius:2rem; color:#a0b3d9;">
                                        <i class="fas fa-inbox" style="font-size:2rem; opacity:0.6;"></i>
                                        <p style="margin-top:0.7rem;">Нет данных, соответствующих фильтру 🔍</p>
                                        <button id="resetFromEmptyBtn" class="btn btn-outline" style="margin-top:1rem;"><i class="fas fa-undo-alt"></i> Сбросить поиск</button>
                                    </div>`;
                const resetEmptyBtn = document.getElementById('resetFromEmptyBtn');
                if (resetEmptyBtn) resetEmptyBtn.addEventListener('click', () => {
                    searchInput.value = '';
                    currentFilterText = '';
                    applyFilterAndRender();
                });
                return;
            }

            let cardsHtml = '';
            for (const [key, dict] of entries) {
                const dictEntries = Object.entries(dict);
                const dictSize = dictEntries.length;
                const escapedKey = escapeHtml(key);

                let dictBodyHtml = '';
                if (dictSize === 0) {
                    dictBodyHtml = `<div class="empty-dict"><i class="far fa-folder-open"></i> Пустой словарь (hash без полей)</div>`;
                } else {
                    for (const [field, val] of dictEntries) {
                        const escapedField = escapeHtml(field);
                        const escapedVal = escapeHtml(String(val ?? ''));
                        dictBodyHtml += `
                        <div class="dict-item">
                            <div class="dict-field">${escapedField}</div>
                            <div class="dict-value">${escapedVal || '<span style="opacity:0.6;">∅</span>'}</div>
                        </div>
                    `;
                    }
                }

                cardsHtml += `
                <div class="redis-card" data-key-id="${escapedKey.replace(/"/g, '&quot;')}">
                    <div class="card-header">
                        <span class="key-name">
                            <i class="fas fa-tag" style="font-size:0.8rem;"></i> ${escapedKey}
                            <span class="badge-length">${dictSize} поле${getNoun(dictSize)}</span>
                        </span>
                        <button class="copy-key" data-copykey="${escapeHtml(key)}" title="Копировать ключ">
                            <i class="far fa-copy"></i>
                        </button>
                    </div>
                    <div class="dict-body">
                        ${dictBodyHtml}
                    </div>
                </div>
            `;
            }
            container.innerHTML = cardsHtml;

            // обработчики копирования
            document.querySelectorAll('.copy-key').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    let rawKey = btn.getAttribute('data-copykey');
                    if (!rawKey) {
                        const parent = btn.closest('.redis-card');
                        const keySpan = parent?.querySelector('.key-name');
                        if (keySpan) rawKey = keySpan.innerText.split('поле')[0].trim();
                    }
                    if (rawKey) {
                        navigator.clipboard.writeText(rawKey).then(() => {
                            showTemporaryToast(btn, '✅ Ключ скопирован');
                        }).catch(() => alert('Не удалось скопировать'));
                    } else {
                        alert('Не удалось определить ключ');
                    }
                });
            });
        }

        function getNoun(count) {
            return (count % 10 === 1 && count % 100 !== 11) ? '' :
                ((count % 10 >= 2 && count % 10 <= 4 && (count % 100 < 10 || count % 100 >= 20)) ? 'я' : 'й');
        }

        function showTemporaryToast(btn, msg) {
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<i class="fas fa-check"></i>`;
            setTimeout(() => {
                btn.innerHTML = originalHTML;
            }, 1200);
        }

        function applyFilterAndRender() {
            const filtered = getFilteredData();
            render(filtered);
        }

        function setNewData(dataObj, resetSearch = true) {
            if (!dataObj || typeof dataObj !== 'object') {
                console.warn('Некорректные данные');
                return;
            }
            const normalized = {};
            for (const [k, v] of Object.entries(dataObj)) {
                if (v && typeof v === 'object' && !Array.isArray(v)) {
                    normalized[k] = v;
                } else {
                    normalized[k] = { '⚠️ значение (не словарь)': JSON.stringify(v) };
                }
            }
            originalData = normalized;
            if (resetSearch) {
                searchInput.value = '';
                currentFilterText = '';
            } else {
                currentFilterText = searchInput.value;
            }
            applyFilterAndRender();
        }

        // --- Загрузка из реального API (без демо) ---
        async function fetchFromApi() {
            container.innerHTML = `<div class="loading-spinner"><i class="fas fa-spinner fa-pulse"></i> Загрузка данных из /get_authorised_users ...</div>`;
            try {
                const response = await fetch('/get_authorised_users', {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status} – ${response.statusText}`);
                }
                const result = await response.json();
                // поддержка обёртки { data: {...} } или прямой результат
                let payload = result;
                if (result && typeof result === 'object' && result.data && typeof result.data === 'object') {
                    payload = result.data;
                }
                if (!payload || typeof payload !== 'object') {
                    throw new Error('Неверный формат: ожидается объект ключ:словарь');
                }
                setNewData(payload, true);
                showStatusMessage(`✅ Загружено ${Object.keys(payload).length} хешей из Redis`, false);
            } catch (err) {
                console.error(err);
                container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:2rem; background:#171c2a; border-radius:2rem; color:#f9ac7c;">
                                        <i class="fas fa-plug-warning" style="font-size:2rem;"></i>
                                        <p style="margin-top:0.8rem;">Не удалось загрузить данные с <code style="background:#1e2638; padding:2px 8px; border-radius:12px;">/get_authorised_users</code></p>
                                        <p style="font-size:0.85rem; color:#b9c3dd;">${escapeHtml(err.message)}</p>
                                        <button id="retryApiBtn" class="btn btn-primary" style="margin-top:1rem;"><i class="fas fa-sync-alt"></i> Повторить запрос</button>
                                    </div>`;
                const retryBtn = document.getElementById('retryApiBtn');
                if (retryBtn) retryBtn.addEventListener('click', () => fetchFromApi());
                showStatusMessage('Ошибка соединения с API Redis', true);
            }
        }

        function showStatusMessage(msg, isError = false) {
            const existing = document.querySelector('.floating-toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'floating-toast';
            toast.style.cssText = `position:fixed; bottom:1.5rem; right:1.5rem; background:${isError ? '#c2410c' : '#1f2a3e'}; color:white; padding:0.6rem 1.2rem; border-radius:2rem; font-size:0.85rem; z-index:1000; box-shadow:0 8px 20px rgba(0,0,0,0.4); backdrop-filter:blur(4px); font-weight:500; display:flex; align-items:center; gap:8px; border-left: 3px solid #f97316;`;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast?.remove(), 2800);
        }

        // обработчики UI
        function initEventListeners() {
            searchInput.addEventListener('input', (e) => {
                currentFilterText = e.target.value;
                applyFilterAndRender();
            });

            clearSearchBtn.addEventListener('click', () => {
                searchInput.value = '';
                currentFilterText = '';
                applyFilterAndRender();
                showStatusMessage('Поиск сброшен', false);
            });

            refreshApiBtn.addEventListener('click', () => {
                fetchFromApi();
            });
        }

        // --- Инициализация: сразу загружаем реальные данные (никаких демо) ---
        function bootstrap() {
            initEventListeners();
            fetchFromApi();   // автоматически запрашиваем Redis базу при загрузке страницы
        }

        bootstrap();
    </script>
</body>

</html>
